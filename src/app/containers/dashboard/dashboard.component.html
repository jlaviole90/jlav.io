<div class="dashboard-page">
    <div class="terminal-window"
         [class.maximized]="isMaximized"
         [class.minimizing]="isMinimizing"
         (click)="skipTyping()">
        <div class="title-bar">
            <div class="window-controls">
                <button class="dot close" (click)="onClose()" aria-label="Close"></button>
                <button class="dot minimize" (click)="onMinimize()" aria-label="Minimize"></button>
                <button class="dot maximize" (click)="onMaximize()" aria-label="Maximize"></button>
            </div>
            <span class="filename">dashboard.go</span>
        </div>
        <div class="editor">
            @for (line of lines; track $index; let lineIdx = $index) {
                <div class="line"
                     [class.nav-line]="isLineReady(lineIdx) && isNavLine(lineIdx)"
                     [class.link-line]="isLineReady(lineIdx) && isLinkLine(lineIdx)"
                     (mouseenter)="onLineHover(lineIdx)"
                     (mouseleave)="onLineLeave()"
                     (click)="onLineClick(lineIdx)"
                     (keydown.enter)="onLineClick(lineIdx)"
                     [attr.tabindex]="isLineReady(lineIdx) && isNavLine(lineIdx) ? 0 : null"
                     [attr.role]="isNavLine(lineIdx) ? 'link' : null">
                    <span class="gutter">{{ lineIdx + 1 }}</span>
                    <span class="code">
                        @for (token of line; track $index) {
                            @if (token.link && isLineReady(lineIdx)) {
                                <a [class]="token.cls"
                                   [href]="token.link"
                                   target="_blank"
                                   rel="noopener"
                                   (click)="$event.stopPropagation()">{{ token.typed }}</a>
                            } @else {
                                <span [class]="token.cls">{{ token.typed }}</span>
                            }
                        }
                        @if (lineIdx === cursorLine) {
                            <span class="cursor" [class.blink]="!isTyping"></span>
                        }
                    </span>
                </div>
            }
        </div>
    </div>
</div>
